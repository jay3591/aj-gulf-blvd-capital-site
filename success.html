<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — A&J Gulf Blvd Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0B1E3F; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: white; border-radius: 12px; padding: 3rem; max-width: 520px; width: 100%; text-align: center; }
  .checkmark { width: 64px; height: 64px; background: #C8A84B; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 28px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: #0B1E3F; margin-bottom: 1rem; }
  p { font-size: 16px; color: #3D4F66; line-height: 1.65; margin-bottom: 2rem; }
  a { display: inline-block; background: #0B1E3F; color: white; padding: 12px 28px; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 14px; }
  a:hover { background: #1E3E72; }
</style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <h1>Thank You!</h1>
    <p>Your loan inquiry has been submitted successfully. Our team will review your request and be in touch with you shortly.</p>
    <a href="/">Return to Website</a>
  </div>
</body>
</html>
